<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cetak Struk</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', 'Courier', monospace;
            font-size: 10pt; line-height: 1.3; color: #000;
            background: #fff; width: 76mm; margin: 0 auto; padding: 0;
        }
        .struk { width: 72mm; margin: 0 auto; padding: 2mm 0; }

        .header-toko { text-align: center; margin-bottom: 4px; }
        .header-toko .nama-toko { font-size: 14pt; font-weight: bold; text-transform: uppercase; }
        .header-toko .alamat, .header-toko .telp { font-size: 9pt; }

        .garis { font-size: 10pt; white-space: nowrap; margin: 2px 0; }
        .info-faktur { font-size: 10pt; margin: 3px 0; }
        .info-faktur table { width: 100%; font-family: 'Courier New', monospace; font-size: 10pt; border-collapse: collapse; }
        .info-faktur td { padding: 0; vertical-align: top; }
        .info-faktur .label { width: 12mm; }

        .tabel-belanja { width: 100%; font-family: 'Courier New', monospace; font-size: 10pt; border-collapse: collapse; margin: 2px 0; }
        .tabel-belanja th { text-align: left; font-weight: bold; padding: 1px 0; border-bottom: 1px dashed #000; }
        .tabel-belanja td { padding: 1px 0; vertical-align: top; }
        .tabel-belanja .col-nama { text-align: left; }
        .tabel-belanja .col-qty { text-align: center; width: 12mm; }
        .tabel-belanja .col-harga { text-align: right; width: 22mm; }
        .tabel-belanja .col-subtotal { text-align: right; width: 22mm; }

        .ringkasan { width: 100%; font-family: 'Courier New', monospace; font-size: 10pt; border-collapse: collapse; margin: 2px 0; }
        .ringkasan td { padding: 1px 0; vertical-align: top; }
        .ringkasan .label { text-align: left; width: 50mm; }
        .ringkasan .nilai { text-align: right; }
        .ringkasan .total-bayar { font-weight: bold; font-size: 12pt; }

        .footer { text-align: center; margin-top: 6px; }
        .footer .terima-kasih { font-size: 11pt; font-weight: bold; margin-bottom: 2px; }
        .footer .pesan { font-size: 9pt; }

        .info-cetak { font-family: sans-serif; font-size: 9pt; color: #666; text-align: center; padding: 16px 12px; }

        @media print {
            @page { size: 76mm auto; margin: 0; }

            * {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            body { width: 76mm; margin: 0; padding: 0; background: #fff; }
            .struk { width: 72mm; margin: 0 auto; padding: 0; }
            .info-cetak { display: none !important; }
            .struk { page-break-after: avoid; page-break-inside: avoid; }
        }
        @media screen {
            body { background: #f5f5f5; padding: 20px 0; }
            .struk { background: #fff; padding: 4mm 3mm; box-shadow: 0 2px 12px rgba(0,0,0,0.15); border-radius: 2px; }
        }
        @media screen and (max-width: 400px) {
            body { width: 100%; padding: 8px 0; }
            .struk { width: 96%; padding: 3mm 2mm; }
            .header-toko .nama-toko { font-size: 12pt; }
            .garis { font-size: 9pt; white-space: normal; overflow: hidden; }
            .tabel-belanja { font-size: 9pt; }
            .tabel-belanja .col-harga, .tabel-belanja .col-subtotal { width: 18mm; font-size: 9pt; }
            .info-cetak { padding: 12px 8px; }
        }
        @media screen and (max-width: 360px) {
            .tabel-belanja .col-harga, .tabel-belanja .col-subtotal { width: 15mm; font-size: 8pt; }
            .tabel-belanja .col-qty { width: 10mm; }
            .ringkasan .label { width: auto; }
        }
    </style>
</head>
<body>
<div class="struk" id="strukContent">
    <div style="text-align:center;padding:20px 0;font-family:sans-serif;color:#999;">
        <p style="font-size:40px;">⏳</p>
        <p>Memuat data struk...</p>
    </div>
</div>

<div class="info-cetak" id="printInfo">
    <p style="margin-top:16px;font-size:10pt;color:#333;"><strong>⏳ Mencetak struk...</strong></p>
    <p>Jika dialog cetak tidak muncul, tekan <strong>Ctrl + P</strong></p>
    <p style="margin-top:12px;">
        <button onclick="window.print()"
                style="padding:8px 24px;font-size:11pt;background:#2d89ef;color:#fff;border:none;border-radius:4px;cursor:pointer;">
            🖨 Cetak Sekarang
        </button>
    </p>
    <p style="margin-top:8px;">
        <a href="kasir.html" style="color:#888;font-size:9pt;">← Kembali ke Kasir</a>
    </p>
</div>

<script>
// ==========================================================
// CETAK STRUK — Firestore Version
// ==========================================================

// Ambil parameter faktur dari URL
const params = new URLSearchParams(window.location.search);
const noFaktur = params.get('faktur');

if (!noFaktur) {
    document.getElementById('strukContent').innerHTML =
        '<div style="text-align:center;padding:20px 0;font-family:sans-serif;color:#999;">' +
        '<p style="font-size:40px;">❌</p><p>Parameter faktur tidak ditemukan.</p></div>';
} else {
    loadStruk(noFaktur);
}

async function loadStruk(faktur) {
    try {
        // Cari transaksi
        const snap = await db.collection('transaksi')
            .where('no_faktur', '==', faktur)
            .limit(1)
            .get();

        if (snap.empty) {
            document.getElementById('strukContent').innerHTML =
                '<div style="text-align:center;padding:20px 0;font-family:sans-serif;color:#999;">' +
                '<p style="font-size:40px;">❌</p><p>Transaksi "' + faktur + '" tidak ditemukan.</p></div>';
            return;
        }

        const transaksi = snap.docs[0].data();
        const items = transaksi.items || [];

        // Format tanggal
        const tanggal = formatTanggal(transaksi.tanggal);

        // Konstanta lebar
        const LEBAR = 40;
        function garis(char) { return str_repeat(char, LEBAR); }
        function str_repeat(c, n) { let r = ''; for (let i = 0; i < n; i++) r += c; return r; }

        function rp(angka) {
            return 'Rp ' + Number(angka).toLocaleString('id-ID');
        }

        // Bangun HTML struk
        let html = '';

        // Header Toko
        html += '<div class="header-toko">';
        // html += '<div class="nama-toko">TOKO MAJU JAYA</div>';  // ← isi nama toko di sini
        html += '<div class="alamat">Jl. Merdeka No. 123, Jakarta</div>';
        html += '<div class="telp">Telp: (021) 1234-5678</div>';
        html += '</div>';

        html += '<div class="garis">' + garis('=') + '</div>';

        // Info Faktur
        html += '<div class="info-faktur">';
        html += '<table><tr><td class="label">Faktur</td><td>: ' + escapeHtml(faktur) + '</td></tr>';
        html += '<tr><td class="label">Tanggal</td><td>: ' + escapeHtml(tanggal) + '</td></tr>';
        html += '<tr><td colspan="2">Kasir : Admin</td></tr>';
        html += '</table></div>';

        html += '<div class="garis">' + garis('-') + '</div>';

        // Tabel Barang
        html += '<table class="tabel-belanja">';
        html += '<thead><tr>';
        html += '<th class="col-nama">Nama Barang</th>';
        html += '<th class="col-qty">Qty</th>';
        html += '<th class="col-harga">Harga</th>';
        html += '<th class="col-subtotal">Subtotal</th>';
        html += '</tr></thead><tbody>';

        if (items.length === 0) {
            html += '<tr><td colspan="4" style="text-align:center;padding:6px 0;"><em>Tidak ada barang</em></td></tr>';
        } else {
            items.forEach(item => {
                html += '<tr>';
                html += '<td class="col-nama">' + escapeHtml(item.nama_produk) + '</td>';
                html += '<td class="col-qty">' + item.jumlah + '</td>';
                html += '<td class="col-harga">' + rp(item.harga) + '</td>';
                html += '<td class="col-subtotal">' + rp(item.subtotal) + '</td>';
                html += '</tr>';
            });
        }

        html += '</tbody></table>';

        html += '<div class="garis">' + garis('-') + '</div>';

        // Ringkasan
        html += '<table class="ringkasan">';
        html += '<tr><td class="label">Total Belanja</td><td class="nilai">' + rp(transaksi.total_bayar) + '</td></tr>';
        html += '<tr><td class="label">Tunai</td><td class="nilai">' + rp(transaksi.nominal_uang) + '</td></tr>';
        html += '<tr><td class="label">Kembalian</td><td class="nilai">' + rp(transaksi.kembalian) + '</td></tr>';
        html += '</table>';

        html += '<div class="garis">' + garis('=') + '</div>';

        // Footer
        html += '<div class="footer">';
        html += '<div class="terima-kasih">TERIMA KASIH</div>';
        html += '<div class="pesan">Selamat Belanja Kembali</div>';
        html += '<div class="pesan">Barang yang sudah dibeli tidak dapat</div>';
        html += '<div class="pesan">ditukar atau dikembalikan</div>';
        html += '</div>';

        document.getElementById('strukContent').innerHTML = html;

        // Auto print setelah data termuat
        setTimeout(() => window.print(), 500);

    } catch (error) {
        console.error('Error:', error);
        document.getElementById('strukContent').innerHTML =
            '<div style="text-align:center;padding:20px 0;font-family:sans-serif;color:#c62828;">' +
            '<p style="font-size:40px;">⚠️</p><p>Error: ' + escapeHtml(error.message) + '</p></div>';
    }
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// Event after print
window.addEventListener('afterprint', function() {
    // Redirect ke kasir setelah print (bisa diaktifkan)
    // window.location.href = 'kasir.html';
});
</script>
</body>
</html>
